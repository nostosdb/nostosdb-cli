# SPDX-License-Identifier: SSPL-1.0
name: CI

on: [push, pull_request, workflow_dispatch]

permissions:
  contents: read

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        include:
          - {os: ubuntu-latest, rust: stable}
          - {os: macos-latest, rust: stable}
          - {os: windows-latest, rust: stable}
          - {os: ubuntu-latest, rust: 1.85.0}
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out CLI
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: {path: nostos-cli}
      - name: Check out Core
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: {repository: nostosdb/nostos-core, path: nostos-core}
      - name: Configure Rust
        run: rustup toolchain install ${{ matrix.rust }} --profile minimal --component rustfmt,clippy
      - name: Format
        working-directory: nostos-cli
        run: rustup run ${{ matrix.rust }} cargo fmt --all --check
      - name: Check
        working-directory: nostos-cli
        run: rustup run ${{ matrix.rust }} cargo check --all-targets --all-features --locked
      - name: Clippy
        working-directory: nostos-cli
        run: rustup run ${{ matrix.rust }} cargo clippy --all-targets --all-features --locked -- -D warnings
      - name: Test
        working-directory: nostos-cli
        run: rustup run ${{ matrix.rust }} cargo test --all-features --locked
      - name: Help and version
        working-directory: nostos-cli
        run: rustup run ${{ matrix.rust }} cargo run --locked -- --version

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - run: cargo install cargo-audit --version 0.22.2 --locked
      - run: cargo audit
