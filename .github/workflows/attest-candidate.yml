# SPDX-License-Identifier: SSPL-1.0
name: Build and attest release candidates

on: workflow_dispatch

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            target: aarch64-apple-darwin
            binary: nostos
            archive: nostos-0.1.0-aarch64-apple-darwin.tar.gz
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            binary: nostos
            archive: nostos-0.1.0-x86_64-apple-darwin.tar.gz
          - runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            binary: nostos.exe
            archive: nostos-0.1.0-aarch64-pc-windows-msvc.zip
          - runner: windows-2022
            target: x86_64-pc-windows-msvc
            binary: nostos.exe
            archive: nostos-0.1.0-x86_64-pc-windows-msvc.zip
          - runner: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            binary: nostos
            archive: nostos-0.1.0-aarch64-unknown-linux-gnu.tar.gz
          - runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            binary: nostos
            archive: nostos-0.1.0-x86_64-unknown-linux-gnu.tar.gz
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Check out CLI
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: {path: nostosdb-cli}
      - name: Check out Core
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: {repository: nostosdb/nostosdb-core, path: nostosdb-core}
      - name: Check out Server client
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: {repository: nostosdb/nostosdb-server, path: nostosdb-server}
      - name: Check out Skills
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: {repository: nostosdb/skills, path: skills}
      - name: Configure target toolchain
        run: rustup toolchain install stable --profile minimal --target ${{ matrix.target }}
      - name: Run target-native Rust tests
        working-directory: nostosdb-cli
        env:
          MACOSX_DEPLOYMENT_TARGET: "13.0"
        run: cargo test --release --all-features --locked --target ${{ matrix.target }}
      - name: Build locked native candidate
        working-directory: nostosdb-cli
        env:
          MACOSX_DEPLOYMENT_TARGET: "13.0"
        run: cargo build --release --all-features --locked --target ${{ matrix.target }}
      - name: Configure minimum Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with: {node-version: "18"}
      - name: Configure candidate Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with: {python-version: "3.13"}
      - name: Verify launcher and candidate tools
        working-directory: nostosdb-cli
        run: |
          npm test --prefix npm
          npm run verify --prefix npm
          python distribution/scripts/verify_source.py
          python -m unittest discover -s distribution/tests -v
      - name: Generate candidate metadata
        working-directory: nostosdb-cli
        run: python distribution/scripts/generate_metadata.py --output dist/metadata
      - name: Record target-native smoke evidence
        working-directory: nostosdb-cli
        run: >-
          python distribution/scripts/smoke_candidate.py
          --target ${{ matrix.target }}
          --binary target/${{ matrix.target }}/release/${{ matrix.binary }}
          --output dist/native-evidence.json
      - name: Assemble and verify direct candidate
        working-directory: nostosdb-cli
        run: |
          python distribution/scripts/assemble_candidate.py --target ${{ matrix.target }} --binary target/${{ matrix.target }}/release/${{ matrix.binary }} --native-evidence dist/native-evidence.json --metadata dist/metadata --output dist/candidate
          python distribution/scripts/verify_candidate.py --archive dist/candidate/${{ matrix.archive }}
      - name: Stage npm candidates without publication
        working-directory: nostosdb-cli
        run: >-
          python distribution/scripts/stage_npm_candidate.py
          --target ${{ matrix.target }}
          --binary target/${{ matrix.target }}/release/${{ matrix.binary }}
          --output dist/npm
      - name: Prove direct, npm-global, and pinned-npx fixture equivalence
        working-directory: nostosdb-cli
        run: >-
          python distribution/scripts/verify_channels.py
          --target ${{ matrix.target }}
          --binary target/${{ matrix.target }}/release/${{ matrix.binary }}
          --native-evidence dist/native-evidence.json
          --metadata dist/metadata
          --skills-root ../skills
      - name: Attest candidate provenance
        uses: actions/attest@36051bcae73b7c2a8a6945a48cbf80953c6baa35 # v4
        with:
          subject-path: nostosdb-cli/dist/candidate/${{ matrix.archive }}
      - name: Upload candidate without publishing a release
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: nostos-candidate-${{ matrix.target }}
          path: |
            nostosdb-cli/dist/candidate/*
            nostosdb-cli/dist/native-evidence.json
            nostosdb-cli/dist/npm/*.tgz
          if-no-files-found: error

  homebrew:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            target: aarch64-apple-darwin
          - runner: macos-15-intel
            target: x86_64-apple-darwin
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      actions: read
    steps:
      - name: Check out CLI
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: {path: nostosdb-cli}
      - name: Check out Core
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: {repository: nostosdb/nostosdb-core, path: nostosdb-core}
      - name: Check out Server client
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: {repository: nostosdb/nostosdb-server, path: nostosdb-server}
      - name: Check out Skills
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: {repository: nostosdb/skills, path: skills}
      - name: Configure minimum Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with: {node-version: "18"}
      - name: Configure candidate Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with: {python-version: "3.13"}
      - name: Download macOS candidates
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          pattern: nostos-candidate-*-apple-darwin
          path: nostosdb-cli/dist/downloads
      - name: Render candidate formula
        working-directory: nostosdb-cli
        run: |
          python distribution/scripts/verify_candidate.py --archive dist/downloads/nostos-candidate-aarch64-apple-darwin/candidate/nostos-0.1.0-aarch64-apple-darwin.tar.gz
          python distribution/scripts/verify_candidate.py --archive dist/downloads/nostos-candidate-x86_64-apple-darwin/candidate/nostos-0.1.0-x86_64-apple-darwin.tar.gz
          python distribution/scripts/render_homebrew.py --arm64-archive dist/downloads/nostos-candidate-aarch64-apple-darwin/candidate/nostos-0.1.0-aarch64-apple-darwin.tar.gz --x64-archive dist/downloads/nostos-candidate-x86_64-apple-darwin/candidate/nostos-0.1.0-x86_64-apple-darwin.tar.gz --output dist/homebrew/Formula/nostos.rb
      - name: Verify and install formula from candidate artifacts
        working-directory: nostosdb-cli
        env:
          HOMEBREW_DEVELOPER: "1"
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: |
          ruby -c dist/homebrew/Formula/nostos.rb
          brew install --formula dist/homebrew/Formula/nostos.rb
          nostos --version
      - name: Prove Homebrew and other channel fixture equivalence
        working-directory: nostosdb-cli
        run: |
          python distribution/scripts/generate_metadata.py --output dist/homebrew-metadata
          python distribution/scripts/verify_channels.py --target ${{ matrix.target }} --binary "$(command -v nostos)" --native-evidence dist/downloads/nostos-candidate-${{ matrix.target }}/native-evidence.json --metadata dist/homebrew-metadata --skills-root ../skills --homebrew-binary "$(command -v nostos)"
      - name: Remove local candidate formula
        if: always()
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: brew uninstall --force nostos || true
